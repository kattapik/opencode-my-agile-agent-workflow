<article class="block span-12" data-block-id="{{block_id}}" data-type="activity">
  <h2>{{title}}</h2>
  <p class="muted">Use for workflows, branching logic, retries, and exit paths.</p>
  <div class="canvas" role="img" aria-label="Activity diagram">
    <svg viewBox="0 0 820 280">
      <defs><marker id="activity-arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="var(--accent)"/></marker></defs>
      <g fill="none" stroke="var(--accent)" stroke-width="2" marker-end="url(#activity-arrow)">
        <path d="M140 80 H270"/><path d="M390 80 H510"/><path d="M630 80 C700 80 700 190 630 190"/><path d="M510 190 H390"/>
      </g>
      <g fill="var(--card)" stroke="var(--line)" stroke-width="2">
        <circle cx="70" cy="80" r="18" fill="var(--accent)"/><rect x="100" y="50" width="120" height="60" rx="14"/><polygon points="330,40 390,80 330,120 270,80"/><rect x="510" y="50" width="120" height="60" rx="14"/><rect x="510" y="160" width="120" height="60" rx="14"/><circle cx="330" cy="190" r="18"/><circle cx="330" cy="190" r="11" fill="var(--ink)"/>
      </g>
      <g fill="var(--ink)" font-family="ui-sans-serif, system-ui" font-size="13" text-anchor="middle">
        <text x="160" y="84">{{activity_1}}</text><text x="330" y="84">{{decision}}</text><text x="570" y="84">{{activity_2}}</text><text x="570" y="194">{{fallback}}</text>
      </g>
    </svg>
  </div>
  <details><summary>Artifact data block</summary><pre><code>{"id":"{{block_id}}","type":"activity","data":{"nodes":[],"edges":[],"branches":[]}}</code></pre></details>
</article>
