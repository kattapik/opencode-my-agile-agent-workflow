<article class="block span-12" data-block-id="{{block_id}}" data-type="kanban">
  <h2>{{title}}</h2>
  <div class="cards">
    <div class="card"><h3>Todo</h3><ul>{{todo_items}}</ul></div>
    <div class="card"><h3>Doing</h3><ul>{{doing_items}}</ul></div>
    <div class="card"><h3>Done</h3><ul>{{done_items}}</ul></div>
  </div>
  <details><summary>Artifact data block</summary><pre><code>{"id":"{{block_id}}","type":"kanban","data":{"columns":[],"cards":[]}}</code></pre></details>
</article>
