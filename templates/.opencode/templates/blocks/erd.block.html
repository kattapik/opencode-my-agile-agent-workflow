<article class="block span-12" data-block-id="{{block_id}}" data-type="erd">
  <h2>{{title}}</h2>
  <div class="cards">
    <div class="card"><h3>{{entity_1}}</h3><ul>{{entity_1_fields}}</ul></div>
    <div class="card"><h3>{{entity_2}}</h3><ul>{{entity_2_fields}}</ul></div>
    <div class="card"><h3>Relationship</h3><p>{{relationship}}</p></div>
  </div>
  <details><summary>Artifact data block</summary><pre><code>{"id":"{{block_id}}","type":"erd","data":{"entities":[],"relationships":[]}}</code></pre></details>
</article>
